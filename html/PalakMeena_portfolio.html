<!DOCTYPE html>

<!-- This is the basic structure of an HTML document -->
<!-- I started with this to build my portfolio step by step -->

<html>

<head>
    <title>Palak Meena Portfolio</title>

    <!-- This defines character encoding -->
    <meta charset="UTF-8">

    <!-- Helps with responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Short description for search engines -->
    <meta name="description" content="Portfolio of Palak Meena, Full Stack Developer">

    <!-- Keywords related to my profile -->
    <meta name="keywords" content="Palak Meena, Developer, Portfolio, Java, Full Stack">

    <!-- Author of the page -->
    <meta name="author" content="Palak Meena">
</head>

<body>

    <!-- Header section will contain my name and profile -->
    <header>

        <!-- I used h1 here because it represents my name as the main heading of the page -->
        <h1>Palak Meena</h1>

        <!-- This line shows my role in a simple way -->
        <p>Java Developer</p>

        <!-- Adding profile image with alt text so it is accessible -->
        <img src="profile.jpg" alt="Profile photo of Palak Meena" width="150" height="150">

    </header>

    <!-- Navigation section for internal links -->
    <nav></nav>

    <!-- About section for introduction -->
    <section id="about"></section>

    <!-- Skills section -->
    <section id="skills"></section>

    <!-- Education details -->
    <section id="education"></section>

    <!-- Projects section -->
    <section id="projects"></section>

    <!-- Contact form section -->
    <section id="contact"></section>

    <!-- Footer section -->
    <footer></footer>

</body>

</html>
