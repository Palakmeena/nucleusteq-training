<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Inventory Dashboard</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Link to external stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="header-logo">
        <div class="logo-icon">📦</div>
        <div class="header-content">
          <h1>Product Inventory Dashboard</h1>
          <p class="header-sub">Track, manage and organize your products</p>
        </div>
      </div>
    </div>
  </header>

  <main class="page-wrapper">

    <!-- CONTROLS SECTION - Search, Filter, Sort -->
    <section class="controls-section">
      <div class="controls-grid">

        <div class="control-group">
          <label for="searchInput">Search</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search products..." />
          </div>
        </div>

        <div class="control-group">
          <label for="categoryFilter">Category</label>
          <select id="categoryFilter">
            <option value="all">All Categories</option>
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="books">Books</option>
            <option value="accessories">Accessories</option>
          </select>
        </div>

        <div class="control-group">
          <label for="sortSelect">Sort By</label>
          <select id="sortSelect">
            <option value="default">Default Order</option>
            <option value="price-low">Price: Low → High</option>
            <option value="price-high">Price: High → Low</option>
            <option value="name-az">Name: A → Z</option>
            <option value="name-za">Name: Z → A</option>
          </select>
        </div>

        <div class="control-group">
          <label class="invisible-label">Filter</label>
          <label class="checkbox-pill" for="lowStockFilter">
            <input type="checkbox" id="lowStockFilter" />
            <span class="pill-text">Low Stock Only</span>
          </label>
        </div>

      </div>
    </section>

</body>

</html>
