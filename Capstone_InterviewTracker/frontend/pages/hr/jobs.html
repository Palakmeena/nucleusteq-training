<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireTrack | Manage Job Descriptions</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
    <link rel="stylesheet" href="../../css/hr/jobs.css">
</head>

<body>

    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-area">
        <header class="topbar">
            <div class="topbar-nav">Job Descriptions</div>
            <div class="topbar-actions">
                <button class="primary-btn" style="padding:8px 16px;" onclick="openModal()">+ Create JD</button>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="page-header">
                <h1 class="page-title">Active Job Descriptions</h1>
            </div>
            <div class="job-list-container" id="hrJobsList">
            </div>
        </div>
    </main>

    <div class="jd-modal-overlay" id="jdModal">
        <div class="modal-box">
            <div style="padding: 24px 32px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center;">
                <h2 id="modalTitle" style="margin: 0; font-size: 20px;">Create Job Description</h2>
                <button type="button" onclick="closeModal()" style="background:#f1f5f9;border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:#64748b;cursor:pointer;transition:0.2s;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div style="padding: 32px; overflow-y: auto; flex: 1;">
                <form id="createJdForm">
                <div class="form-grid">
                    <div class="form-group"><label>Job Title</label><input type="text" id="jobTitle" required></div>
                    <div class="form-group"><label>Location</label><input type="text" id="location"
                            placeholder="e.g., Remote, Indore" required></div>

                    <div class="form-group">
                        <label>Job Type</label>
                        <select id="jobType" required>
                            <option value="FULL_TIME">Full-Time</option>
                            <option value="CONTRACT">Contract</option>
                            <option value="REMOTE">Remote</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Experience Range (Years)</label>
                        <div style="display:flex; gap:10px;">
                            <input type="number" id="minExp" placeholder="Min" required min="0">
                            <input type="number" id="maxExp" placeholder="Max" required min="0">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Salary Range (LPA)</label>
                        <div style="display:flex; gap:10px;">
                            <input type="number" id="minSalary" placeholder="Min" required min="0">
                            <input type="number" id="maxSalary" placeholder="Max" required min="0">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Skills (Press Enter to add)</label>
                        <input type="text" id="skillInput" placeholder="Java, Spring Boot...">
                        <div id="skillsList" style="margin-top: 8px;"></div>
                    </div>

                    <div class="form-group full-width">
                        <label>Detailed Description</label>
                        <textarea id="description" rows="4" required></textarea>
                    </div>
                </div>

                <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:24px;">
                    <button type="button" class="secondary-btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="primary-btn">Publish Position</button>
                </div>
            </form>
            </div>
        </div>
    </div>

    <script src="../../js/services/api.js"></script>
    <script src="../../js/services/authService.js"></script>
    <script src="../../js/svg-icons.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/features/hr/jobs.js"></script>
</body>

</html>
