<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireTrack | Panel Members</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
    <link rel="stylesheet" href="../../css/panel/onboarding.css">
</head>
<body>

<aside class="sidebar" id="sidebar"></aside>

<main class="main-area">
    <header class="topbar">
        <div class="topbar-nav">Panel Members</div>
        <div class="topbar-actions">
            <button class="primary-btn panel-topbar-btn" onclick="document.getElementById('addPanelModal').classList.add('active')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Add Panel Member
            </button>
        </div>
    </header>

    <div class="content-wrapper">
        <div class="page-header">
            <div>
                <h1 class="page-title">Panel Members</h1>
                <p class="page-subtitle">Onboard interviewers and manage your panel directory.</p>
            </div>
        </div>

        <div class="panel-filter-row">
            <div class="search-container panel-search-box">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="panelSearchInput" placeholder="Search by name, email, organization, or designation...">
            </div>
            <span id="panelCountLabel" class="panel-count-label"></span>
        </div>

        <div id="panelList"><div class="panel-loading-state">Loading...</div></div>
    </div>
</main>

<!-- ADD PANEL MODAL -->
<div class="modal-overlay" id="addPanelModal">
    <div class="modal-box">
        <div class="panel-modal-header-row">
            <h3 class="panel-modal-title">Add Panel Member</h3>
            <button onclick="document.getElementById('addPanelModal').classList.remove('active')" class="panel-close-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div id="panelFormError" class="panel-form-error"></div>
        <div class="form-row">
            <div class="form-group"><label>Full Name *</label><input type="text" id="pFullName" placeholder="John Rao"></div>
            <div class="form-group"><label>Email *</label><input type="email" id="pEmail" placeholder="john@company.com"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Mobile Number *</label>
                <div class="panel-phone-group">
                    <div class="panel-phone-prefix">+91</div>
                    <input type="text" id="pMobile" placeholder="9876543210" class="panel-phone-input" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
            </div>
            <div class="form-group"><label>Organization *</label><input type="text" id="pOrg" placeholder="TechCorp"></div>
        </div>
        <div class="form-group"><label>Designation *</label><input type="text" id="pDesignation" placeholder="Senior Developer"></div>
        <div class="panel-action-row">
            <button class="secondary-btn" onclick="document.getElementById('addPanelModal').classList.remove('active')">Cancel</button>
            <button class="primary-btn panel-primary-auto" onclick="createPanel()">Create</button>
        </div>
    </div>
</div>
<!-- EDIT PANEL MODAL -->
<div class="modal-overlay" id="editPanelModal">
    <div class="modal-box">
        <div class="panel-modal-header-row">
            <h3 class="panel-modal-title">Edit Panel Member</h3>
            <button onclick="document.getElementById('editPanelModal').classList.remove('active')" class="panel-close-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Full Name *</label><input type="text" id="eFullName"></div>
            <div class="form-group"><label>Email (Account ID)</label><input type="text" id="eEmail" disabled class="panel-disabled-input"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Mobile Number *</label>
                <div class="panel-phone-group">
                    <div class="panel-phone-prefix">+91</div>
                    <input type="text" id="eMobile" class="panel-phone-input" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
            </div>
            <div class="form-group"><label>Organization *</label><input type="text" id="eOrg"></div>
        </div>
        <div class="form-group"><label>Designation *</label><input type="text" id="eDesignation"></div>
        <div class="panel-action-row">
            <button class="secondary-btn" onclick="document.getElementById('editPanelModal').classList.remove('active')">Cancel</button>
            <button class="primary-btn panel-primary-auto" onclick="updatePanel()">Save Changes</button>
        </div>
    </div>
</div>

<script src="../../js/services/api.js"></script>
<script src="../../js/services/authService.js"></script>    <script src="../../js/svg-icons.js"></script><script src="../../js/utils.js"></script>
<script src="../../js/features/panel/onboarding.js"></script>
</body>
</html>
