<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireTrack | Create Job Description</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
    <link rel="stylesheet" href="../../css/hr/create-jd.css">
</head>

<body>
    <aside class="sidebar">
        <div class="brand"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z">
                </path>
                <path
                    d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z">
                </path>
            </svg> HireTrack</div>
        <div class="profile-section">
            <div class="profile-title">HR Manager</div>
            <div class="profile-role">Hiring Manager</div>
        </div>
        <nav class="nav-menu">
            <a href="pipeline.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg> Dashboard</a>
            <a href="jobs.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg> Job Descriptions</a>
            <a href="candidates.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                </svg> Candidates</a>
            <a href="schedule-interview.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                </svg> Interviews</a>
            <a href="panel-onboarding.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg> Panel Members</a>
        </nav>
        <div class="post-job-btn-container"><button class="primary-btn"
                onclick="window.location.href='create-jd.html'">+ New Job Post</button></div>
        <div class="sidebar-bottom">
            <a href="#" class="bottom-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg> Support</a>
            <a href="../auth/login.html" class="bottom-item logout" onclick="localStorage.clear()"><svg width="18"
                    height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg> Sign Out</a>
        </div>
    </aside>

    <main class="main-area">
        <header class="topbar">
            <div class="topbar-nav"><a href="../../index.html">Job Descriptions</a><span
                    class="create-jd-breadcrumb-separator">/</span><a href="#" class="active">Create New</a></div>
            <div class="topbar-actions">
                <div class="create-jd-avatar-badge">HR</div>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Create Job Description</h1>
                    <p class="page-subtitle">Fill in the details to post a new position.</p>
                </div>
            </div>

            <div class="form-card">
                <form id="createJdForm">
                    <div class="form-row">
                        <div class="form-group"><label>Job Title</label><input type="text" id="jobTitle"
                                placeholder="e.g. Senior Frontend Engineer" required></div>
                        <div class="form-group"><label>Location</label><input type="text" id="location"
                                placeholder="e.g. Bangalore, India" required></div>
                    </div>
                    <div class="form-group"><label>Job Description</label><textarea id="description"
                            placeholder="Describe the role, responsibilities, and requirements..." required></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Job Type</label>
                            <select id="jobType" required>
                                <option value="FULL_TIME">Full Time</option>
                                <option value="CONTRACT">Contract</option>
                                <option value="REMOTE">Remote</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Experience Range</label>
                            <div class="create-jd-inline-row"><input type="number" id="minExp" placeholder="Min"
                                    min="0" required><input type="number" id="maxExp" placeholder="Max" min="0"
                                    required></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Min Salary (LPA)</label><input type="number" id="minSalary"
                                min="0" step="0.1" required></div>
                        <div class="form-group"><label>Max Salary (LPA)</label><input type="number" id="maxSalary"
                                min="0" step="0.1" required></div>
                    </div>
                    <div class="form-group">
                        <label>Skills Required</label>
                        <div class="create-jd-inline-row"><input type="text" id="skillInput"
                            placeholder="Type a skill and press Add"><button type="button" class="secondary-btn create-jd-skill-add-btn"
                            onclick="addSkill()">+ Add</button></div>
                        <div class="skills-container" id="skillsList"></div>
                    </div>
                    <div class="create-jd-form-actions">
                        <button type="button" class="secondary-btn"
                            onclick="window.location.href='../../index.html'">Cancel</button>
                        <button type="submit" class="primary-btn create-jd-primary-auto">Publish Job</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="../../js/features/hr/create-jd.js"></script>
</body>

</html>
