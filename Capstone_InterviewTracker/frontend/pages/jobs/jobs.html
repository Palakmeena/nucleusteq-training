<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireTrack | Jobs</title>
    <link rel="stylesheet" href="../../css/jobs/jobs.css">
</head>

<body>
    <header class="landing-header">
        <a class="landing-brand" href="../../index.html">HireTrack</a>
        <div class="header-nav">
            <a href="../../index.html">Home</a>
            <a href="#" class="active">Jobs</a>
        </div>
        <div class="landing-actions" id="authSection">
            <a href="../auth/login.html" class="login-btn">Login</a>
            <a href="../auth/signup.html" class="signup-btn">Sign Up</a>
        </div>
    </header>

    <section class="jobs-header">
        <h1>Open Jobs</h1>
        <p>Find and apply to current opportunities.</p>
        <div class="search-wrapper">
            <div class="search-input-group">
                <input type="text" id="searchInput" placeholder="Search by title or location">
            </div>
        </div>
    </section>

    <section class="jobs-section">
        <div id="jdList" class="jd-grid">
            <div style="grid-column: 1 / -1; text-align: center; color: #64748b; padding: 40px;">Loading positions...
            </div>
        </div>
    </section>

    <div class="modal-overlay" id="applyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Apply for <span id="modalJobTitle"></span></h2>
                <button class="close-btn" onclick="closeApplyModal()">X</button>
            </div>
            <div class="modal-body">
                <div id="applyErrorMsg" style="color: #dc2626; font-size: 14px; margin-bottom: 16px; display: none;">
                </div>
                <div id="applySuccessMsg"
                    style="color: #16a34a; font-size: 14px; margin-bottom: 16px; display: none; background: #dcfce7; padding: 12px; border-radius: 6px;">
                    Application submitted successfully!</div>
                <form id="applyForm">
                    <input type="hidden" id="applyJdId">
                    <div class="form-row">
                        <div class="form-group"><label>Full Name</label><input type="text" id="applyName" required>
                        </div>
                        <div class="form-group"><label>Email</label><input type="email" id="applyEmail" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group" style="display:flex; gap:8px;">
                            <div style="flex:0 0 80px;"><label>Code</label><input type="text" id="applyMobileCode"
                                    value="+91" required></div>
                            <div style="flex:1;"><label>Mobile Number</label><input type="text" id="applyMobile"
                                    required></div>
                        </div>
                        <div class="form-group"><label>Date of Birth (Optional)</label><input type="date" id="applyDob">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Current Organization</label><input type="text" id="applyOrg"
                                required></div>
                        <div class="form-group"><label>Preferred Location</label><input type="text" id="applyLocation"
                                required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Total Experience (Yrs)</label><input type="number"
                                id="applyTotalExp" min="0" step="0.1" required></div>
                        <div class="form-group"><label>Relevant Experience (Yrs)</label><input type="number"
                                id="applyRelExp" min="0" step="0.1" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Current CTC (LPA)</label><input type="number"
                                id="applyCurrentCtc" min="0" step="0.1" required></div>
                        <div class="form-group"><label>Expected CTC (LPA)</label><input type="number"
                                id="applyExpectedCtc" min="0" step="0.1" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Notice Period (Days)</label><input type="number" id="applyNotice"
                                min="0" required></div>
                        <div class="form-group">
                            <label>Source</label>
                            <select id="applySource" required>
                                <option value="LinkedIn">LinkedIn</option>
                                <option value="Indeed">Indeed</option>
                                <option value="Company Website">Company Website</option>
                                <option value="Referral">Referral</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group"><label>Resume (PDF only, Max 5MB)</label><input type="file" id="applyResume"
                            accept=".pdf" style="padding: 8px 0;" required></div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="secondary-btn" onclick="closeApplyModal()">Cancel</button>
                <button type="button" class="primary-btn" onclick="submitApplication()">Submit Application</button>
            </div>
        </div>
    </div>

    <script src="../../js/services/api.js"></script>
    <script src="../../js/services/authService.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/features/jobs/jobs.js"></script>
</body>

</html>
