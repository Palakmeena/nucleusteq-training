            <body>
            <script>
                const params = new URLSearchParams(window.location.search);
                const token = params.get('token');
                if (token) {
                    window.location.replace(`activate.html?token=${encodeURIComponent(token)}`);
                } else {
                    window.location.replace('activate.html');
                }
            </script>
            </body>
