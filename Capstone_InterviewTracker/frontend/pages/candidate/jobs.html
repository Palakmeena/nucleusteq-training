<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireTrack | Jobs</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
    <style>
        .job-list-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .job-row-card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: #fff;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
        }

        .job-title { font-size:16px; font-weight:700; color:#0f172a; margin-bottom:6px; }
        .job-meta { font-size:12px; color:#64748b; margin-bottom:8px; }
        .job-desc { font-size:13px; color:#475569; line-height:1.5; margin-bottom:10px; }

        .tag-wrap {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 11px;
            padding: 3px 8px;
            background: #f1f5f9;
            border-radius: 999px;
            color: #475569;
            font-weight: 600;
        }

        .apply-btn { background:#4f46e5; color:#fff; border:none; border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; }
        .apply-btn:disabled { background:#cbd5e1; cursor:not-allowed; }

        @media (max-width: 900px) {
            .job-row-card {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-area">
    <header class="topbar">
        <div class="topbar-nav">Jobs</div>
    </header>
    <div class="content-wrapper">
        <div class="page-header">
            <div>
                <h1 class="page-title">Open Roles</h1>
                <p class="page-subtitle">Browse HR-created jobs and apply when eligible.</p>
            </div>
        </div>

        <div class="table-card" style="padding:20px;">
            <div id="applyRuleText" style="font-size:13px;color:#64748b;margin-bottom:14px;"></div>
            <div id="availableJobsList" class="job-list-container">
                <div style="text-align:center;color:#94a3b8;padding:28px;">Loading jobs...</div>
            </div>
        </div>
    </div>
</main>

    <!-- APPLY MODAL -->
    <div class="modal-overlay" id="candidateApplyModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div class="modal-content" style="background:#fff; border-radius:16px; width:90%; max-width:640px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.15);">
            <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; padding:20px 24px; border-bottom:1px solid #e2e8f0;">
                <h2 style="font-size:18px; font-weight:700;">Apply for <span id="modalJobTitle"></span></h2>
                <button onclick="closeApplyModal()" style="background:none; border:none; font-size:24px; cursor:pointer; color:#94a3b8;">&times;</button>
            </div>
            <div class="modal-body" style="padding:24px;">
                <div id="applyErrorMsg" style="color:#ef4444; font-size:14px; margin-bottom:16px; display:none;"></div>
                <div id="applySuccessMsg" style="color:#10b981; font-size:14px; margin-bottom:16px; display:none; background:#ecfdf5; padding:12px; border-radius:8px;">Application submitted successfully!</div>
                
                <form id="candidateApplyForm">
                    <input type="hidden" id="applyJdId">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
                        <div class="form-group"><label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">Full Name</label><input type="text" id="applyName" required style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px;"></div>
                        <div class="form-group"><label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">Email</label><input type="email" id="applyEmail" required style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px;"></div>
                    </div>
                    <div style="display:grid; grid-template-columns:80px 1fr 1fr; gap:16px; margin-bottom:16px;">
                        <div class="form-group"><label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">Code</label><input type="text" id="applyMobileCode" value="+91" required style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px;"></div>
                        <div class="form-group"><label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">Mobile</label><input type="text" id="applyMobile" required style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px;"></div>
                        <div class="form-group"><label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">Date of Birth</label><input type="date" id="applyDob" required style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px;"></div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
                        <div class="form-group"><label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">Current Organization</label><input type="text" id="applyOrg" required style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px;"></div>
                        <div class="form-group"><label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">Preferred Location</label><input type="text" id="applyLocation" required style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px;"></div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
                        <div class="form-group"><label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">Total Exp (Yrs)</label><input type="number" step="0.1" id="applyTotalExp" required style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px;"></div>
                        <div class="form-group"><label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">Rel Exp (Yrs)</label><input type="number" step="0.1" id="applyRelExp" required style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px;"></div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
                        <div class="form-group"><label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">Current CTC (LPA)</label><input type="number" step="0.1" id="applyCurrentCtc" required style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px;"></div>
                        <div class="form-group"><label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">Expected CTC (LPA)</label><input type="number" step="0.1" id="applyExpectedCtc" required style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px;"></div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
                        <div class="form-group"><label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">Notice Period (Days)</label><input type="number" id="applyNotice" required style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px;"></div>
                        <div class="form-group">
                            <label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">Source</label>
                            <select id="applySource" required style="width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px;">
                                <option value="LinkedIn">LinkedIn</option>
                                <option value="Indeed">Indeed</option>
                                <option value="Website">Website</option>
                                <option value="Referral">Referral</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label style="display:block; font-size:13px; font-weight:500; margin-bottom:6px;">Resume (PDF - Optional)</label>
                        <input type="file" id="applyResume" accept=".pdf" style="font-size:13px;">
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="padding:16px 24px; border-top:1px solid #e2e8f0; display:flex; justify-content:flex-end; gap:12px;">
                <button class="secondary-btn" onclick="closeApplyModal()">Cancel</button>
                <button class="primary-btn" onclick="submitApplication()" id="submitBtn">Submit Application</button>
            </div>
        </div>
    </div>

<script src="../../js/services/api.js"></script>
<script src="../../js/services/authService.js"></script>
<script src="../../js/utils.js"></script>
<script>
    auth.requireRole('CANDIDATE');
    document.getElementById('sidebar').innerHTML = buildSidebar('CANDIDATE', 'jobs');

    let myProfile = null;
    let allOpenJobs = [];

    function shortText(text, max = 180) {
        const value = (text || '').trim();
        if (!value) return 'No description available.';
        return value.length > max ? value.slice(0, max) + '...' : value;
    }

    function openJobDetails(id) {
        const jd = allOpenJobs.find(item => item.id === id);
        if (!jd) return;
        showJdModal({ title: jd.jobTitle || 'Untitled Role', details: jd.jobDescription || 'No details provided.' });
    }

    function canApplyNow() {
        return !myProfile || !myProfile.currentStage || myProfile.currentStage === 'REJECTED';
    }

    async function loadCandidateProfile() {
        try {
            const profileRes = await api.getMyProfile();
            myProfile = profileRes.data;
        } catch (e) {
            myProfile = null;
        }
    }

    async function loadAvailableJobs() {
        const jobsEl = document.getElementById('availableJobsList');
        const ruleTextEl = document.getElementById('applyRuleText');
        const locked = !canApplyNow();

        ruleTextEl.textContent = locked
            ? 'You already have an active application. You can apply again only after HR marks it Rejected.'
            : 'You can apply for one role now.';

        try {
            const res = await api.getAllPublicJds();
            const jobs = res.data || [];
            allOpenJobs = jobs;

            if (!jobs.length) {
                jobsEl.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:28px;">No open roles from HR right now.</div>';
                return;
            }

            jobsEl.innerHTML = jobs.map(j => `
                <div class="job-row-card">
                    <div style="flex:1;min-width:0;">
                        <div class="job-title">${j.jobTitle || 'Untitled Role'}</div>
                        <div class="job-meta"> ${j.location || 'N/A'} &nbsp;|&nbsp;  ${j.jobType || 'N/A'} &nbsp;|&nbsp;  ${j.minExperience ?? 0}-${j.maxExperience ?? 0} yrs &nbsp;|&nbsp;  ${j.minSalary ?? 0}-${j.maxSalary ?? 0} LPA</div>
                        <div class="job-desc">${shortText(j.jobDescription)}</div>
                        <div class="tag-wrap">${(j.skills || []).map(s => `<span class="tag">${s}</span>`).join('')}</div>
                    </div>
                    <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap;">
                        <button class="secondary-btn" style="padding:8px 14px;font-size:13px;" onclick="openJobDetails(${j.id})">View Job</button>
                        <button class="apply-btn" onclick="openApplyModal(${j.id}, '${j.jobTitle.replace(/'/g, "\\'")}')" ${locked ? 'disabled' : ''}>${locked ? 'Application Locked' : 'Apply Now'}</button>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            jobsEl.innerHTML = '<div style="text-align:center;color:#ef4444;padding:28px;">Failed to load open roles.</div>';
        }
    }

    function openApplyModal(jobId, jobTitle) {
        if (!canApplyNow()) {
            showToast('You already have an active application.', 'error');
            return;
        }

        document.getElementById('modalJobTitle').textContent = jobTitle;
        document.getElementById('applyJdId').value = jobId;
        document.getElementById('candidateApplyModal').style.display = 'flex';

        // Pre-fill if profile exists
        if (myProfile) {
            document.getElementById('applyName').value = myProfile.fullName || '';
            document.getElementById('applyEmail').value = myProfile.email || '';
            document.getElementById('applyMobileCode').value = myProfile.mobileCode || '+91';
            document.getElementById('applyMobile').value = myProfile.mobileNumber || '';
            document.getElementById('applyDob').value = myProfile.dateOfBirth || '';
            document.getElementById('applyOrg').value = myProfile.currentOrganization || '';
            document.getElementById('applyLocation').value = myProfile.preferredLocation || '';
            document.getElementById('applyTotalExp').value = myProfile.totalExperience || '';
            document.getElementById('applyRelExp').value = myProfile.relevantExperience || '';
            document.getElementById('applyCurrentCtc').value = myProfile.currentCtc || '';
            document.getElementById('applyExpectedCtc').value = myProfile.expectedCtc || '';
            document.getElementById('applyNotice').value = myProfile.noticePeriod || '';
        } else {
            document.getElementById('applyEmail').value = localStorage.getItem('userEmail') || '';
            document.getElementById('applyName').value = localStorage.getItem('userName') || '';
        }
    }

    function closeApplyModal() {
        document.getElementById('candidateApplyModal').style.display = 'none';
        document.getElementById('candidateApplyForm').reset();
        document.getElementById('applyErrorMsg').style.display = 'none';
        document.getElementById('applySuccessMsg').style.display = 'none';
    }

    async function submitApplication() {
        const form = document.getElementById('candidateApplyForm');
        const errorMsg = document.getElementById('applyErrorMsg');
        const successMsg = document.getElementById('applySuccessMsg');
        const btn = document.getElementById('submitBtn');

        if (!form.checkValidity()) {
            errorMsg.textContent = 'Please fill all mandatory fields.';
            errorMsg.style.display = 'block';
            return;
        }

        errorMsg.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Submitting...';

        const payload = {
            jobDescriptionId: parseInt(document.getElementById('applyJdId').value),
            fullName: document.getElementById('applyName').value,
            email: document.getElementById('applyEmail').value,
            mobileCode: document.getElementById('applyMobileCode').value,
            mobileNumber: document.getElementById('applyMobile').value,
            dateOfBirth: document.getElementById('applyDob').value,
            currentOrganization: document.getElementById('applyOrg').value,
            preferredLocation: document.getElementById('applyLocation').value,
            totalExperience: parseFloat(document.getElementById('applyTotalExp').value),
            relevantExperience: parseFloat(document.getElementById('applyRelExp').value),
            currentCtc: parseFloat(document.getElementById('applyCurrentCtc').value),
            expectedCtc: parseFloat(document.getElementById('applyExpectedCtc').value),
            noticePeriod: parseInt(document.getElementById('applyNotice').value),
            source: document.getElementById('applySource').value
        };

        try {
            const res = await api.registerCandidate(payload);
            const candidateId = res.data.id;
            const resumeFile = document.getElementById('applyResume').files[0];
            
            if (resumeFile) {
                await api.uploadResume(candidateId, resumeFile);
            }

            successMsg.style.display = 'block';
            setTimeout(() => {
                closeApplyModal();
                window.location.href = 'dashboard.html';
            }, 1500);
        } catch (err) {
            errorMsg.textContent = err.message;
            errorMsg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Submit Application';
        }
    }

    window.openApplyModal = openApplyModal;
    window.closeApplyModal = closeApplyModal;
    window.submitApplication = submitApplication;

    async function initJobsPage() {
        await loadCandidateProfile();
        await loadAvailableJobs();
    }

    initJobsPage();
</script>
</body>
</html>
