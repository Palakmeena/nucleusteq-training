<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireTrack | Jobs</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
    <link rel="stylesheet" href="../../css/candidate/jobs.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-area">
    <header class="topbar">
        <div class="topbar-nav">Jobs</div>
    </header>
    <div class="content-wrapper">
        <div class="page-header">
            <div>
                <h1 class="page-title">Open Roles</h1>
                <p class="page-subtitle">Browse HR-created jobs and apply when eligible.</p>
            </div>
        </div>

        <div class="table-card jobs-table-card">
            <div id="applyRuleText" class="jobs-apply-rule-text"></div>
            <div id="availableJobsList" class="jobs-list-container">
                <div class="jobs-loading">Loading jobs...</div>
            </div>
        </div>
    </div>
</main>

    <!-- APPLY MODAL -->
    <div class="jobs-apply-modal" id="candidateApplyModal">
        <div class="jobs-modal-content">
            <div class="jobs-modal-header">
                <h2 class="jobs-modal-title">Apply for <span id="modalJobTitle"></span></h2>
                <button type="button" id="modalCloseBtn" class="jobs-modal-close">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="jobs-modal-body">
                <div id="applyErrorMsg" class="jobs-error-msg"></div>
                <div id="applySuccessMsg" class="jobs-success-msg">Application submitted successfully!</div>
                
                <form id="candidateApplyForm">
                    <input type="hidden" id="applyJdId">
                    <div class="jobs-form-grid-2col">
                        <div class="jobs-form-group"><label class="jobs-form-label">Full Name</label><input type="text" id="applyName" required class="jobs-form-input"></div>
                        <div class="jobs-form-group"><label class="jobs-form-label">Email</label><input type="email" id="applyEmail" required class="jobs-form-input"></div>
                    </div>
                    <div class="jobs-form-grid-3col">
                        <div class="jobs-form-group"><label class="jobs-form-label">Code</label><input type="text" id="applyMobileCode" value="+91" readonly class="jobs-form-input"></div>
                        <div class="jobs-form-group"><label class="jobs-form-label">Mobile</label><input type="text" id="applyMobile" maxlength="10" inputmode="numeric" required class="jobs-form-input"></div>
                        <div class="jobs-form-group"><label class="jobs-form-label">Date of Birth</label><input type="date" id="applyDob" required class="jobs-form-input"></div>
                    </div>
                    <div class="jobs-form-grid-2col">
                        <div class="jobs-form-group"><label class="jobs-form-label">Current Organization</label><input type="text" id="applyOrg" required class="jobs-form-input"></div>
                        <div class="jobs-form-group"><label class="jobs-form-label">Preferred Location</label><input type="text" id="applyLocation" required class="jobs-form-input"></div>
                    </div>
                    <div class="jobs-form-grid-2col">
                        <div class="jobs-form-group">
                            <label class="jobs-form-label">Gender</label>
                            <select id="applyGender" required class="jobs-form-select">
                                <option value="" disabled selected>Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="jobs-form-grid-2col">
                        <div class="jobs-form-group"><label class="jobs-form-label">Total Exp (Yrs)</label><input type="number" step="0.1" id="applyTotalExp" required class="jobs-form-input"></div>
                        <div class="jobs-form-group"><label class="jobs-form-label">Rel Exp (Yrs)</label><input type="number" step="0.1" id="applyRelExp" required class="jobs-form-input"></div>
                    </div>
                    <div class="jobs-form-grid-2col">
                        <div class="jobs-form-group"><label class="jobs-form-label">Current CTC (LPA)</label><input type="number" step="0.1" id="applyCurrentCtc" required class="jobs-form-input"></div>
                        <div class="jobs-form-group"><label class="jobs-form-label">Expected CTC (LPA)</label><input type="number" step="0.1" id="applyExpectedCtc" required class="jobs-form-input"></div>
                    </div>
                    <div class="jobs-form-grid-2col">
                        <div class="jobs-form-group"><label class="jobs-form-label">Notice Period (Days)</label><input type="number" id="applyNotice" required class="jobs-form-input"></div>
                        <div class="jobs-form-group">
                            <label class="jobs-form-label">Source</label>
                            <select id="applySource" required class="jobs-form-select">
                                <option value="LinkedIn">LinkedIn</option>
                                <option value="Indeed">Indeed</option>
                                <option value="Website">Website</option>
                                <option value="Referral">Referral</option>
                            </select>
                        </div>
                    </div>
                    <div class="jobs-form-group-full">
                        <label class="jobs-form-label">Resume (PDF - Required)</label>
                        <input type="file" id="applyResume" accept=".pdf" class="jobs-form-input" required>
                    </div>
                </form>
            </div>
            <div class="jobs-modal-footer">
                <button class="secondary-btn" id="cancelBtn">Cancel</button>
                <button class="primary-btn" id="submitBtn">Submit Application</button>
            </div>
        </div>
    </div>

<script src="../../js/services/api.js"></script>
<script src="../../js/services/authService.js"></script>    <script src="../../js/svg-icons.js"></script><script src="../../js/utils.js"></script>
<script src="../../js/features/candidate/jobs.js"></script>
</body>
</html>
