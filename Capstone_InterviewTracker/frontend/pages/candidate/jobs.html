<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireTrack | Jobs</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
    <style>
        .job-list-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .job-row-card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: #fff;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 14px;
        }

        .job-title { font-size:16px; font-weight:700; color:#0f172a; margin-bottom:6px; }
        .job-meta { font-size:12px; color:#64748b; margin-bottom:8px; }
        .job-desc { font-size:13px; color:#475569; line-height:1.5; margin-bottom:10px; }

        .tag-wrap {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 11px;
            padding: 3px 8px;
            background: #f1f5f9;
            border-radius: 999px;
            color: #475569;
            font-weight: 600;
        }

        .apply-btn { background:#4f46e5; color:#fff; border:none; border-radius:8px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; }
        .apply-btn:disabled { background:#cbd5e1; cursor:not-allowed; }

        @media (max-width: 900px) {
            .job-row-card {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-area">
    <header class="topbar">
        <div class="topbar-nav">Jobs</div>
    </header>
    <div class="content-wrapper">
        <div class="page-header">
            <div>
                <h1 class="page-title">Open Roles</h1>
                <p class="page-subtitle">Browse HR-created jobs and apply when eligible.</p>
            </div>
        </div>

        <div class="table-card" style="padding:20px;">
            <div id="applyRuleText" style="font-size:13px;color:#64748b;margin-bottom:14px;"></div>
            <div id="availableJobsList" class="job-list-container">
                <div style="text-align:center;color:#94a3b8;padding:28px;">Loading jobs...</div>
            </div>
        </div>
    </div>
</main>

<script src="../../js/services/api.js"></script>
<script src="../../js/services/authService.js"></script>
<script src="../../js/utils.js"></script>
<script>
    auth.requireRole('CANDIDATE');
    document.getElementById('sidebar').innerHTML = buildSidebar('CANDIDATE', 'jobs');

    let myProfile = null;

    function canApplyNow() {
        return !myProfile || myProfile.currentStage === 'REJECTED';
    }

    async function loadCandidateProfile() {
        try {
            const profileRes = await api.getMyProfile();
            myProfile = profileRes.data;
        } catch (e) {
            myProfile = null;
        }
    }

    async function loadAvailableJobs() {
        const jobsEl = document.getElementById('availableJobsList');
        const ruleTextEl = document.getElementById('applyRuleText');
        const locked = !canApplyNow();

        ruleTextEl.textContent = locked
            ? 'You already have an active application. You can apply again only after HR marks it Rejected.'
            : 'You can apply for one role now.';

        try {
            const res = await api.getAllPublicJds();
            const jobs = res.data || [];

            if (!jobs.length) {
                jobsEl.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:28px;">No open roles from HR right now.</div>';
                return;
            }

            jobsEl.innerHTML = jobs.map(j => `
                <div class="job-row-card">
                    <div style="flex:1;min-width:0;">
                        <div class="job-title">${j.jobTitle || 'Untitled Role'}</div>
                        <div class="job-meta">📍 ${j.location || 'N/A'} &nbsp;|&nbsp; 💼 ${j.jobType || 'N/A'} &nbsp;|&nbsp; 🎯 ${j.minExperience ?? 0}-${j.maxExperience ?? 0} yrs &nbsp;|&nbsp; 💰 ${j.minSalary ?? 0}-${j.maxSalary ?? 0} LPA</div>
                        <div class="job-desc">${j.jobDescription || 'No description available.'}</div>
                        <div class="tag-wrap">${(j.skills || []).map(s => `<span class="tag">${s}</span>`).join('')}</div>
                    </div>
                    <div style="display:flex;align-items:center;justify-content:flex-end;">
                        <button class="apply-btn" onclick="openApplyFlow(${j.id})" ${locked ? 'disabled' : ''}>${locked ? 'Application Locked' : 'Apply Now'}</button>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            jobsEl.innerHTML = '<div style="text-align:center;color:#ef4444;padding:28px;">Failed to load open roles.</div>';
        }
    }

    function openApplyFlow(jobId) {
        if (!canApplyNow()) {
            showToast('You can apply again only after HR marks your current application as Rejected.', 'error');
            return;
        }
        window.location.href = `../jobs/jobs.html?openApply=${jobId}`;
    }

    window.openApplyFlow = openApplyFlow;

    async function initJobsPage() {
        await loadCandidateProfile();
        await loadAvailableJobs();
    }

    initJobsPage();
</script>
</body>
</html>
