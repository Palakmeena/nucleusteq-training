<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireTrack | My Progress</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
    <link rel="stylesheet" href="../../css/candidate-dashboard.css">
</head>

<body>
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-area">
        <header class="topbar">
            <div class="topbar-nav">My Progress</div>
        </header>
        <div class="content-wrapper">
            <div class="page-header">
                <div>
                    <h1 class="page-title" id="welcomeText">Welcome back!</h1>
                    <p class="page-subtitle">Here's where your application stands today.</p>
                </div>
            </div>

            <!-- APPLICATION STATUS CARD -->
            <div class="dash-status-card">
                <div class="dash-status-header">
                    <div>
                        <div class="dash-job-info-label">Applied For</div>
                        <div class="dash-job-title" id="jobTitle">Loading...</div>
                        <div class="dash-applied-date" id="appliedDate">—</div>
                    </div>
                    <div id="currentStageBadge"></div>
                </div>

                <!-- STEPPER -->
                <div class="stage-stepper" id="stageStepper">
                    <!-- built by JS -->
                </div>
                <div id="stageLabelsRow" class="dash-stage-labels-row">
                    <span class="dash-stage-label">Profiling</span>
                    <span class="dash-stage-label">Screening</span>
                    <span class="dash-stage-label">L1 Interview</span>
                    <span class="dash-stage-label">L2 Interview</span>
                    <span class="dash-stage-label">HR Round</span>
                </div>
                <div id="stageNote" class="dash-stage-note"></div>
            </div>

            <!-- INTERVIEW SECTION -->
            <div class="dash-interview-container">
                <div>
                    <div id="interviewSection" style="display:none;" class="interview-card">
                        <div class="dash-interview-header">
                            <h3 class="dash-interview-title">
                                <div class="dash-interview-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line></svg>
                                </div>
                                Upcoming Interview
                            </h3>
                            <div class="dash-interview-stage-label" id="iStage">—</div>
                        </div>

                        <div class="dash-interview-details">
                            <div class="dash-interview-detail">
                                <div class="dash-interview-detail-label">Date</div>
                                <div class="dash-interview-detail-value" id="iDate">—</div>
                            </div>
                            <div class="dash-interview-detail">
                                <div class="dash-interview-detail-label">Time</div>
                                <div class="dash-interview-detail-value" id="iTime">—</div>
                            </div>
                        </div>
                    </div>
                    <div id="noInterviewSection" class="dash-no-interview">
                        <div class="dash-no-interview-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        </div>
                        <div class="dash-no-interview-title">No interview scheduled yet</div>
                        <div class="dash-no-interview-subtitle">HR will schedule your next interview soon</div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="../../js/services/api.js"></script>
    <script src="../../js/services/authService.js"></script>
    <script src="../../js/svg-icons.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/features/candidate/dashboard.js"></script>
</body>

</html>
