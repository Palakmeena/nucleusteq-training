<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireTrack | My Progress</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
</head>

<body>
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-area">
        <header class="topbar">
            <div class="topbar-nav">My Progress</div>
        </header>
        <div class="content-wrapper">
            <div class="page-header">
                <div>
                    <h1 class="page-title" id="welcomeText">Welcome back!</h1>
                    <p class="page-subtitle">Here's where your application stands today.</p>
                </div>
            </div>

            <!-- APPLICATION STATUS CARD -->
            <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:28px;margin-bottom:20px;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;">
                    <div>
                        <div
                            style="font-size:12px;color:#94a3b8;text-transform:uppercase;font-weight:600;margin-bottom:6px;">
                            Applied For</div>
                        <div style="font-size:20px;font-weight:700;color:#0f172a;" id="jobTitle">Loading...</div>
                        <div style="font-size:13px;color:#64748b;margin-top:4px;" id="appliedDate">—</div>
                    </div>
                    <div id="currentStageBadge"></div>
                </div>

                <!-- STEPPER -->
                <div class="stage-stepper" id="stageStepper">
                    <!-- built by JS -->
                </div>
                <div id="stageLabelsRow" style="display:flex;justify-content:space-between;">
                    <span class="stage-label" style="font-size:12px;flex:1;text-align:center;">Profiling</span>
                    <span class="stage-label" style="font-size:12px;flex:1;text-align:center;">Screening</span>
                    <span class="stage-label" style="font-size:12px;flex:1;text-align:center;">L1 Interview</span>
                    <span class="stage-label" style="font-size:12px;flex:1;text-align:center;">L2 Interview</span>
                    <span class="stage-label" style="font-size:12px;flex:1;text-align:center;">HR Round</span>
                </div>
                <div id="stageNote" style="margin-top:20px;font-size:15px;font-weight:500;color:#1e293b;text-align:center;"></div>
            </div>

            <!-- INTERVIEW SECTION -->
            <div class="single-col" style="display:grid;grid-template-columns:1fr;">
                <div>
                    <div id="interviewSection" style="display:none;" class="interview-card">
                        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px;">
                            <h3 style="display:flex; align-items:center; gap:12px; margin:0; font-size:18px; font-weight:600;">
                                <div style="background:rgba(255,255,255,0.2); padding:10px; border-radius:10px; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px);">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line></svg>
                                </div>
                                Upcoming Interview
                            </h3>
                            <div style="background:rgba(255,255,255,0.15); padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; letter-spacing:0.5px; border:1px solid rgba(255,255,255,0.2);" id="iStage">—</div>
                        </div>

                        <div style="display:flex; gap:40px; margin-bottom:8px;">
                            <div>
                                <div style="font-size:12px; color:rgba(255,255,255,0.7); margin-bottom:6px; text-transform:uppercase; font-weight:600; letter-spacing:0.5px;">Date</div>
                                <div style="font-size:16px; font-weight:500;" id="iDate">—</div>
                            </div>
                            <div>
                                <div style="font-size:12px; color:rgba(255,255,255,0.7); margin-bottom:6px; text-transform:uppercase; font-weight:600; letter-spacing:0.5px;">Time</div>
                                <div style="font-size:16px; font-weight:500;" id="iTime">—</div>
                            </div>
                        </div>
                    </div>
                    <div id="noInterviewSection"
                        style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:28px;text-align:center;color:#94a3b8;">
                        <div style="font-size:36px;margin-bottom:12px;color:#e2e8f0;display:flex;justify-content:center;">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        </div>
                        <div style="font-size:15px;font-weight:500;color:#64748b;">No interview scheduled yet</div>
                        <div style="font-size:13px;margin-top:6px;">HR will schedule your next interview soon</div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="../../js/services/api.js"></script>
    <script src="../../js/services/authService.js"></script>
    <script src="../../js/svg-icons.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/features/candidate/dashboard.js"></script>
</body>

</html>
