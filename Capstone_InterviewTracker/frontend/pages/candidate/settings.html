<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireTrack | My Profile</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
    <style>
        .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #64748b; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; }
        .form-group input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 32px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar"></aside>

<main class="main-area">
    <header class="topbar">
        <div class="topbar-nav">My Profile</div>
        <div class="topbar-actions">
            <button class="primary-btn" onclick="saveProfile()" id="saveBtn">Save Changes</button>
        </div>
    </header>

    <div class="content-wrapper" style="max-width: 900px;">
        <div class="page-header">
            <div>
                <h1 class="page-title">Personal Profile</h1>
                <p class="page-subtitle">Update your information. Changes here do not affect your submitted applications.</p>
            </div>
        </div>

        <div class="card">
            <form id="profileForm">
                <div class="profile-grid">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" required>
                    </div>
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" id="dateOfBirth">
                    </div>
                    <div class="form-group">
                        <label>Mobile Code</label>
                        <input type="text" id="mobileCode" placeholder="+91">
                    </div>
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="text" id="mobileNumber">
                    </div>
                </div>

                <div style="margin-top: 10px; padding-top: 24px; border-top: 1px solid #f1f5f9;">
                    <h3 style="font-size: 15px; font-weight: 600; margin-bottom: 20px;">Professional Details</h3>
                    <div class="profile-grid">
                        <div class="form-group">
                            <label>Current Organization</label>
                            <input type="text" id="currentOrganization">
                        </div>
                        <div class="form-group">
                            <label>Preferred Location</label>
                            <input type="text" id="preferredLocation">
                        </div>
                        <div class="form-group">
                            <label>Total Experience (Years)</label>
                            <input type="number" step="0.1" id="totalExperience">
                        </div>
                        <div class="form-group">
                            <label>Relevant Experience (Years)</label>
                            <input type="number" step="0.1" id="relevantExperience">
                        </div>
                    </div>
                </div>

                <div style="margin-top: 10px; padding-top: 24px; border-top: 1px solid #f1f5f9;">
                    <h3 style="font-size: 15px; font-weight: 600; margin-bottom: 20px;">Resume & Documents</h3>
                    <div style="background: #f8fafc; border: 2px dashed #e2e8f0; border-radius: 12px; padding: 30px; text-align: center;">
                        <div id="resumeStatus" style="margin-bottom: 15px; font-size: 14px; color: #475569; font-weight: 500;">
                            Checking for existing resume...
                        </div>
                        <input type="file" id="resumeInput" accept=".pdf" style="display: none;" onchange="handleFileSelect(this)">
                        <button type="button" class="secondary-btn" onclick="document.getElementById('resumeInput').click()" id="uploadBtn">
                            Choose New Resume (PDF)
                        </button>
                        <p style="margin-top: 12px; font-size: 12px; color: #94a3b8;">Max size: 5MB</p>
                    </div>
                </div>
            </form>
        </div>

        <div style="margin-top: 30px; text-align: right;">
            <button onclick="auth.logout()" style="background:none; border:none; color:#ef4444; font-size:14px; font-weight:500; cursor:pointer; text-decoration: underline;">Sign Out</button>
        </div>
    </div>
</main>

<script src="../../js/services/api.js"></script>
<script src="../../js/services/authService.js"></script>
<script src="../../js/utils.js"></script>
<script>
    auth.requireRole('CANDIDATE');
    document.getElementById('sidebar').innerHTML = buildSidebar('CANDIDATE', 'settings');

    let currentProfile = null;

    async function loadProfile() {
        try {
            const res = await api.getMyProfile();
            currentProfile = res.data;
            if (currentProfile) {
                document.getElementById('fullName').value = currentProfile.fullName || '';
                document.getElementById('dateOfBirth').value = currentProfile.dateOfBirth || '';
                document.getElementById('mobileCode').value = currentProfile.mobileCode || '';
                document.getElementById('mobileNumber').value = currentProfile.mobileNumber || '';
                document.getElementById('currentOrganization').value = currentProfile.currentOrganization || '';
                document.getElementById('preferredLocation').value = currentProfile.preferredLocation || '';
                document.getElementById('totalExperience').value = currentProfile.totalExperience || '';
                document.getElementById('relevantExperience').value = currentProfile.relevantExperience || '';
                
                const status = document.getElementById('resumeStatus');
                if (currentProfile.resumePath) {
                    status.innerHTML = `✅ Resume is uploaded. <a href="${currentProfile.resumePath}" target="_blank" style="color:#4f46e5; text-decoration:none;">View Current</a>`;
                } else {
                    status.innerHTML = `⚠️ No resume uploaded yet.`;
                }
            }
        } catch (e) {
            showToast('Failed to load profile: ' + e.message, 'error');
        }
    }

    async function saveProfile() {
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.textContent = 'Saving...';

        const data = {
            fullName: document.getElementById('fullName').value,
            dateOfBirth: document.getElementById('dateOfBirth').value,
            mobileCode: document.getElementById('mobileCode').value,
            mobileNumber: document.getElementById('mobileNumber').value,
            currentOrganization: document.getElementById('currentOrganization').value,
            preferredLocation: document.getElementById('preferredLocation').value,
            totalExperience: document.getElementById('totalExperience').value,
            relevantExperience: document.getElementById('relevantExperience').value
        };

        try {
            await api.updateMyProfile(data);
            showToast('Profile updated successfully', 'success');
        } catch (e) {
            showToast('Update failed: ' + e.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Save Changes';
        }
    }

    async function handleFileSelect(input) {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        
        if (file.type !== 'application/pdf') {
            showToast('Only PDF files are allowed', 'error');
            return;
        }

        const uploadBtn = document.getElementById('uploadBtn');
        const status = document.getElementById('resumeStatus');
        
        try {
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading to Drive...';
            status.textContent = 'Uploading... Please wait.';

            await api.uploadProfileResume(file);
            
            showToast('Resume uploaded successfully to Google Drive', 'success');
            loadProfile(); // Refresh link
        } catch (e) {
            showToast('Upload failed: ' + e.message, 'error');
        } finally {
            uploadBtn.disabled = false;
            uploadBtn.textContent = 'Choose New Resume (PDF)';
        }
    }

    loadProfile();
</script>
</body>
</html>
