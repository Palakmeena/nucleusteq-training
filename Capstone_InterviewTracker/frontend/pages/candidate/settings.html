<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireTrack | My Profile</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
    <link rel="stylesheet" href="../../css/candidate/settings.css">
</head>
<body>

<aside class="sidebar" id="sidebar"></aside>

<main class="main-area">
    <header class="topbar">
        <div class="topbar-nav">My Profile</div>
        <div class="topbar-actions">
            <button class="primary-btn" onclick="saveProfile()" id="saveBtn">Save Changes</button>
        </div>
    </header>

    <div class="content-wrapper" style="max-width: 900px;">
        <div class="page-header">
            <div>
                <h1 class="page-title">Personal Profile</h1>
                <p class="page-subtitle">Update your information. Changes here do not affect your submitted applications.</p>
            </div>
        </div>

        <div class="card">
            <form id="profileForm">
                <div class="profile-grid">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" required>
                    </div>
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" id="dateOfBirth">
                    </div>
                    <div class="form-group">
                        <label>Mobile Code</label>
                        <input type="text" id="mobileCode" placeholder="+91">
                    </div>
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="text" id="mobileNumber">
                    </div>
                </div>

                <div style="margin-top: 10px; padding-top: 24px; border-top: 1px solid #f1f5f9;">
                    <h3 style="font-size: 15px; font-weight: 600; margin-bottom: 20px;">Professional Details</h3>
                    <div class="profile-grid">
                        <div class="form-group">
                            <label>Current Organization</label>
                            <input type="text" id="currentOrganization">
                        </div>
                        <div class="form-group">
                            <label>Preferred Location</label>
                            <input type="text" id="preferredLocation">
                        </div>
                        <div class="form-group">
                            <label>Total Experience (Years)</label>
                            <input type="number" step="0.1" id="totalExperience">
                        </div>
                        <div class="form-group">
                            <label>Relevant Experience (Years)</label>
                            <input type="number" step="0.1" id="relevantExperience">
                        </div>
                    </div>
                </div>

                <div style="margin-top: 10px; padding-top: 24px; border-top: 1px solid #f1f5f9;">
                    <h3 style="font-size: 15px; font-weight: 600; margin-bottom: 20px;">Resume & Documents</h3>
                    <div style="background: #f8fafc; border: 2px dashed #e2e8f0; border-radius: 12px; padding: 30px; text-align: center;">
                        <div id="resumeStatus" style="margin-bottom: 15px; font-size: 14px; color: #475569; font-weight: 500;">
                            Checking for existing resume...
                        </div>
                        <input type="file" id="resumeInput" accept=".pdf" style="display: none;" onchange="handleFileSelect(this)">
                        <button type="button" class="secondary-btn" onclick="document.getElementById('resumeInput').click()" id="uploadBtn">
                            Choose New Resume (PDF)
                        </button>
                        <p style="margin-top: 12px; font-size: 12px; color: #94a3b8;">Max size: 5MB</p>
                    </div>
                </div>
            </form>
        </div>

        <div style="margin-top: 30px; text-align: right;">
            <button onclick="auth.logout()" style="background:none; border:none; color:#ef4444; font-size:14px; font-weight:500; cursor:pointer; text-decoration: underline;">Sign Out</button>
        </div>
    </div>
</main>

<script src="../../js/services/api.js"></script>
<script src="../../js/services/authService.js"></script>    <script src="../../js/svg-icons.js"></script><script src="../../js/utils.js"></script>
<script src="../../js/features/candidate/settings.js"></script>
</body>
</html>
