<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireTrack | Panel Overview</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-area">
    <header class="topbar">
        <div class="topbar-nav">Overview</div>
    </header>
    <div class="content-wrapper">
        <div class="page-header">
            <div>
                <h1 class="page-title" id="welcomeText">Welcome!</h1>
                <p class="page-subtitle">Here's your interview schedule and tasks for today.</p>
            </div>
        </div>
        <div class="metrics-grid" style="grid-template-columns:repeat(3,1fr);">
            <div class="metric-card"><div class="metric-icon blue">📅</div><div><div class="metric-value" id="totalInterviews">—</div><div class="metric-label">Total Assigned</div></div></div>
            <div class="metric-card"><div class="metric-icon amber">⏳</div><div><div class="metric-value" id="upcoming">—</div><div class="metric-label">Upcoming</div></div></div>
            <div class="metric-card"><div class="metric-icon green">✅</div><div><div class="metric-value" id="completed">—</div><div class="metric-label">Completed</div></div></div>
        </div>
        <div class="table-card">
            <div class="table-header"><h3 style="font-size:15px;font-weight:600;">My Assigned Interviews</h3><a href="assigned-Interviews.html" style="font-size:13px;color:#4f46e5;text-decoration:none;">View All →</a></div>
            <table class="data-table">
                <thead><tr><th>Candidate</th><th>Stage</th><th>Date</th><th>Time</th><th>Focus Areas</th></tr></thead>
                <tbody id="interviewBody"><tr><td colspan="5" style="text-align:center;padding:40px;color:#94a3b8;">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
</main>
<script src="../../js/services/api.js"></script>
<script src="../../js/services/authService.js"></script>
<script src="../../js/utils.js"></script>
<script>
    auth.requireRole('PANEL');
    document.getElementById('sidebar').innerHTML = buildSidebar('PANEL', 'overview');
    document.getElementById('welcomeText').textContent = 'Welcome, ' + auth.getFullName() + '!';

    async function load() {
        try {
            const res = await api.getMyAssignedInterviews();
            const interviews = res.data || [];
            document.getElementById('totalInterviews').textContent = interviews.length;
            document.getElementById('upcoming').textContent = interviews.filter(i => !i.completed).length;
            document.getElementById('completed').textContent = interviews.filter(i => i.completed).length;
            const tbody = document.getElementById('interviewBody');
            tbody.innerHTML = interviews.length ? interviews.slice(0,5).map(i => `
                <tr>
                    <td style="font-weight:500;">${i.candidateName}</td>
                    <td>${stageBadge(i.interviewStage)}</td>
                    <td style="font-size:13px;">${formatDate(i.interviewDate)}</td>
                    <td style="font-size:13px;">${i.interviewTime || '—'}</td>
                    <td style="font-size:13px;color:#64748b;">${i.focusAreas || '—'}</td>
                </tr>
            `).join('') : '<tr><td colspan="5" style="text-align:center;padding:40px;color:#94a3b8;">No interviews assigned yet</td></tr>';
        } catch(e) { showToast('Failed to load: ' + e.message, 'error'); }
    }
    load();
</script>
</body>
</html>
