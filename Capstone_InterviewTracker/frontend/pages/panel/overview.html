<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireTrack | Panel Overview</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<main class="main-area">
    <header class="topbar">
        <div class="topbar-nav">Overview</div>
    </header>
    <div class="content-wrapper">
        <div class="page-header">
            <div>
                <h1 class="page-title" id="welcomeText">Welcome!</h1>
                <p class="page-subtitle">Here's your interview schedule and tasks for today.</p>
            </div>
        </div>
        <div class="metrics-grid metrics-grid-3col">
            <div class="metric-card">
                <div class="metric-icon blue">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                </div>
                <div><div class="metric-value" id="totalInterviews">—</div><div class="metric-label">Total Assigned</div></div>
            </div>
            <div class="metric-card">
                <div class="metric-icon amber">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                </div>
                <div><div class="metric-value" id="upcoming">—</div><div class="metric-label">Upcoming</div></div>
            </div>
            <div class="metric-card">
                <div class="metric-icon green">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <div><div class="metric-value" id="completed">—</div><div class="metric-label">Completed</div></div>
            </div>
        </div>
        <div class="table-card">
            <div class="table-header"><h3 class="table-header-title">My Assigned Interviews</h3><a href="assigned-Interviews.html" class="table-header-link">View All →</a></div>
            <table class="data-table">
                <thead><tr><th>Candidate</th><th>Stage</th><th>Date</th><th>Time</th><th>Focus Areas</th></tr></thead>
                <tbody id="interviewBody"><tr><td colspan="5" class="table-loading-cell">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
</main>
<script src="../../js/services/api.js"></script>
<script src="../../js/services/authService.js"></script>
<script src="../../js/svg-icons.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/features/panel/overview.js"></script>
</body>
</html>
